<title>Oppgaver</title>
<div class="page-tasks" style="max-width:780px;margin:0 auto;padding:24px 16px">
    <div class="breadcrumb"><a href="/">Ukenotater</a> / Oppgaver</div>
    <h1 style="font-family:Georgia,serif;font-weight:400;color:var(--accent,#ed8936);margin:0 0 16px">☑️ Oppgaver</h1>
    <task-create id="tasksPageCreate"
        tasks_service="week-note-services.tasks_service"
        autofocus-on-connect placeholder="Ny oppgave..."
        style="display:block;margin-bottom:20px"></task-create>
    <task-open-list id="tasksPageList"
        tasks_service="week-note-services.tasks_service"
        people_service="week-note-services.people_service"
        companies_service="week-note-services.companies_service"
        show_add_button="false"></task-open-list>
</div>
