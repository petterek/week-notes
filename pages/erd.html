<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<title>ER-diagram — Week Notes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: system-ui, sans-serif;
    background: #f7f7f8;
    color: #1a1a2e;
    padding: 24px;
}
h1 { font-size: 1.4em; margin-bottom: 16px; color: #2a4365; }
.layout { display: flex; gap: 24px; height: calc(100vh - 100px); }
.editor-pane { flex: 0 0 42%; display: flex; flex-direction: column; }
.preview-pane { flex: 1; overflow: auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; }
textarea {
    flex: 1; width: 100%; resize: none;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.82em;
    padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;
    background: #fff; color: #1a1a2e; line-height: 1.5;
}
textarea:focus { outline: 2px solid #2a4365; border-color: transparent; }
.toolbar { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
button {
    padding: 6px 14px; border: 1px solid #cbd5e0; border-radius: 6px;
    background: #fff; cursor: pointer; font-size: 0.88em;
}
button:hover { background: #edf2f7; }
button.primary { background: #2a4365; color: #fff; border-color: #2a4365; }
button.primary:hover { background: #1a365d; }
.status { font-size: 0.8em; color: #718096; margin-left: auto; }
.preview-pane img { max-width: 100%; height: auto; }
.preview-pane .error { color: #c53030; padding: 12px; }
</style>
</head>
<body>
<h1>📐 ER-diagram — Datamodell</h1>
<div class="layout">
    <div class="editor-pane">
        <div class="toolbar">
            <button class="primary" id="renderBtn">▶ Render</button>
            <button id="saveBtn">💾 Lagre</button>
            <button id="resetBtn">↺ Tilbakestill</button>
            <span class="status" id="status"></span>
        </div>
        <textarea id="src" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane" id="preview">
        <p style="color:#718096">Trykk «Render» for å vise diagrammet.</p>
    </div>
</div>
<script>
const textarea = document.getElementById('src');
const preview = document.getElementById('preview');
const status = document.getElementById('status');
const renderBtn = document.getElementById('renderBtn');
const saveBtn = document.getElementById('saveBtn');
const resetBtn = document.getElementById('resetBtn');

let serverSrc = '';

async function loadFromServer() {
    try {
        const res = await fetch('/api/erd');
        const data = await res.json();
        serverSrc = data.src || '';
        textarea.value = serverSrc;
    } catch (e) {
        status.textContent = 'Kunne ikke laste fra server';
    }
}

async function saveToServer() {
    const src = textarea.value;
    status.textContent = 'Lagrer…';
    try {
        const res = await fetch('/api/erd', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ src }),
        });
        const data = await res.json();
        if (data.ok) {
            serverSrc = src;
            status.textContent = 'Lagret ✓';
        } else {
            status.textContent = 'Feil ved lagring';
        }
    } catch (e) {
        status.textContent = 'Feil: ' + e.message;
    }
}

function encodePlantUml(text) {
    const data = new TextEncoder().encode(text);
    const cs = new CompressionStream('deflate');
    const writer = cs.writable.getWriter();
    writer.write(data);
    writer.close();
    return new Response(cs.readable).arrayBuffer().then(buf => {
        const bytes = new Uint8Array(buf);
        return encode64(bytes);
    });
}

function encode6bit(b) {
    if (b < 10) return String.fromCharCode(48 + b);
    b -= 10;
    if (b < 26) return String.fromCharCode(65 + b);
    b -= 26;
    if (b < 26) return String.fromCharCode(97 + b);
    b -= 26;
    if (b === 0) return '-';
    if (b === 1) return '_';
    return '?';
}

function append3bytes(b1, b2, b3) {
    const c1 = b1 >> 2;
    const c2 = ((b1 & 0x3) << 4) | (b2 >> 4);
    const c3 = ((b2 & 0xF) << 2) | (b3 >> 6);
    const c4 = b3 & 0x3F;
    return encode6bit(c1 & 0x3F) + encode6bit(c2 & 0x3F) + encode6bit(c3 & 0x3F) + encode6bit(c4 & 0x3F);
}

function encode64(data) {
    let r = '';
    for (let i = 0; i < data.length; i += 3) {
        if (i + 2 === data.length) {
            r += append3bytes(data[i], data[i + 1], 0);
        } else if (i + 1 === data.length) {
            r += append3bytes(data[i], 0, 0);
        } else {
            r += append3bytes(data[i], data[i + 1], data[i + 2]);
        }
    }
    return r;
}

async function render() {
    const src = textarea.value.trim();
    if (!src) { preview.innerHTML = '<p class="error">Tom kilde</p>'; return; }
    status.textContent = 'Rendrer…';
    try {
        const encoded = await encodePlantUml(src);
        const url = 'https://www.plantuml.com/plantuml/svg/~1' + encoded;
        preview.innerHTML = `<img src="${url}" alt="ER diagram" />`;
        status.textContent = textarea.value !== serverSrc ? 'Ulagrede endringer' : 'OK ✓';
    } catch (e) {
        preview.innerHTML = `<p class="error">Feil: ${e.message}</p>`;
        status.textContent = 'Feil';
    }
}

renderBtn.addEventListener('click', render);
saveBtn.addEventListener('click', async () => { await saveToServer(); render(); });
resetBtn.addEventListener('click', async () => {
    await loadFromServer();
    render();
});

textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); render(); }
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveToServer(); }
});

// Load and render on init
loadFromServer().then(render);
</script>
</body>
</html>
