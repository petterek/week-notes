<!-- Home page fragment. Loaded by the SPA router into <main id="content">. -->
<title>Hjem</title>
<div class="home-layout">
    <aside id="taskSidebar" class="task-sidebar">
        <div class="task-sidebar-inner">
            <task-open-list
                tasks_service="week-note-services.tasks_service"
                people_service="week-note-services.people_service"
                companies_service="week-note-services.companies_service"></task-open-list>
            <upcoming-meetings
                meetings_service="week-note-services.meetings_service"
                people_service="week-note-services.people_service"
                companies_service="week-note-services.companies_service"
                days="{{UPCOMING_MEETINGS_DAYS}}"></upcoming-meetings>
            <today-calendar
                meetings_service="week-note-services.meetings_service"
                settings_service="week-note-services.settings_service"></today-calendar>
        </div>
    </aside>
    <div id="homeMain" class="home-main">
        <week-list
            notes_service="week-note-services.notes_service"
            results_service="week-note-services.results_service"
            tasks_service="week-note-services.tasks_service"
            people_service="week-note-services.people_service"
            companies_service="week-note-services.companies_service"></week-list>
    </div>
</div>
